<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EnglishUp - Levels</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f0f9f0; }
        .level-card {
            border: none;
            border-radius: 20px;
            transition: transform 0.2s;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .level-card:hover { transform: translateY(-5px); }
        .level-badge {
            background: #58CC02;
            color: white;
            border-radius: 50px;
            padding: 5px 15px;
            font-weight: bold;
        }
        .btn-start {
            background: #58CC02;
            color: white;
            border: none;
            border-radius: 25px;
            padding: 8px 25px;
            font-weight: bold;
        }
        .btn-start:hover { background: #46a302; color: white; }
        h1 { color: #58CC02; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container py-5">
        <div class="text-center mb-5">
            <h1>📚 Choose Your Level</h1>
            <p class="text-muted">Select your English level and start learning!</p>
        </div>
        <div class="row g-4">
            {% for level in levels %}
            <div class="col-md-4">
                <div class="card level-card p-4">
                    <div class="card-body text-center">
                        <div style="font-size: 3rem;">{{ level.icon }}</div>
                        <span class="level-badge mt-2 d-inline-block">{{ level.code }}</span>
                        <h4 class="mt-3 fw-bold">{{ level.name }}</h4>
                        <p class="text-muted">{{ level.description }}</p>
                        <a href="/lessons/{{ level.code }}/" class="btn btn-start mt-2">Start Learning</a>
                    </div>
                </div>
            </div>
            {% empty %}
            <div class="col-12 text-center">
                <p class="text-muted">No levels yet. Add them from admin panel.</p>
            </div>
            {% endfor %}
        </div>
    </div>
</body>
</html>
