 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EnglishUp - {{ level.name }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f0f9f0; }
        .lesson-card {
            border: none;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
            transition: transform 0.2s;
        }
        .lesson-card:hover { transform: translateY(-3px); }
        .lesson-number {
            background: #58CC02;
            color: white;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            flex-shrink: 0;
        }
        .btn-lesson {
            background: #58CC02;
            color: white;
            border: none;
            border-radius: 20px;
            padding: 6px 20px;
            font-weight: bold;
        }
        .btn-lesson:hover { background: #46a302; color: white; }
        .level-header {
            background: #58CC02;
            color: white;
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 30px;
        }
    </style>
</head>
<body>
    <div class="container py-5">
        <div class="level-header text-center">
            <div style="font-size: 3rem;">{{ level.icon }}</div>
            <h2 class="fw-bold">{{ level.name }}</h2>
            <p>{{ level.description }}</p>
        </div>

        <a href="/lessons/" class="btn btn-outline-secondary mb-4">← Back to Levels</a>

        <div class="row g-3">
            {% for lesson in lessons %}
            <div class="col-12">
                <div class="card lesson-card p-3">
                    <div class="card-body d-flex align-items-center justify-content-between">
                        <div class="d-flex align-items-center gap-3">
                            <div class="lesson-number">{{ forloop.counter }}</div>
                            <div>
                                <h5 class="mb-0 fw-bold">{{ lesson.title }}</h5>
                                <small class="text-muted">{{ lesson.description }}</small>
                            </div>
                        </div>
                        <a href="/lessons/lesson/{{ lesson.pk }}/" class="btn btn-lesson">Start</a>
                    </div>
                </div>
            </div>
            {% empty %}
            <div class="col-12 text-center">
                <p class="text-muted">No lessons yet for this level.</p>
            </div>
            {% endfor %}
        </div>
    </div>
</body>
</html>
